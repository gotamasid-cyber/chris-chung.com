<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel — Chris Chung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #f0ede8;
    --black: #0a0a0a;
    --tracking-nav: 0.22em;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--black);
    overflow: hidden;
  }

  .video-wrap {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .video-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px;
    background: linear-gradient(to bottom, rgba(10,10,10,0.6) 0%, transparent 100%);
    opacity: 0;
    animation: fadeIn 0.8s ease 0.4s forwards;
  }

  .nav-name {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 14px;
    letter-spacing: var(--tracking-nav);
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .nav-name:hover { opacity: 0.5; }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: var(--tracking-nav);
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .nav-links a:hover { opacity: 0.5; }
  .nav-links a.active { opacity: 0.35; cursor: default; pointer-events: none; }

  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    padding: 20px 48px;
    background: linear-gradient(to top, rgba(10,10,10,0.5) 0%, transparent 100%);
    opacity: 0;
    animation: fadeIn 0.8s ease 0.6s forwards;
  }

  footer span {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(240, 237, 232, 0.25);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (max-width: 768px) {
    nav { padding: 22px 28px; }
    .nav-links { gap: 24px; }
  }

  @media (max-width: 480px) {
    .nav-links a { font-size: 10px; }
  }
</style>
</head>
<body>

<div class="video-wrap">
  <iframe
    src="https://player.vimeo.com/video/1173020707?autoplay=1&loop=0&title=0&byline=0&portrait=0&color=f0ede8&background=0"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

<nav>
  <a href="index.html" class="nav-name">Chris Chung</a>
  <ul class="nav-links">
    <li><a href="reel.html" class="active">Reel</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<footer>
  <span>Camera Operator &nbsp;&middot;&nbsp; Steadicam &nbsp;&middot;&nbsp; IATSE 667 &nbsp;&middot;&nbsp; Toronto</span>
</footer>

</body>
</html>
