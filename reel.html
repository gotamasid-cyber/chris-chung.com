<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #f0ede8;
    --black: #0a0a0a;

  html, body {

  .video-wrap {

  nav {

    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px;
    background: linear-gradient(to bottom, rgba(10,10,10,0.6) 0%, transparent 100%);
    opacity: 0;
    animation: fadeIn 0.8s ease 0.4s forwards;
  }


  .nav-identity {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-role {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(240, 237, 232, 0.45);
  }

  .nav-name {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 24px;
    letter-spacing: var(--tracking-nav);
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .nav-name:hover { opacity: 0.5; }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: var(--tracking-nav);
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .nav-links a:hover { opacity: 0.5; }
  .nav-links a.active { opacity: 0.35; cursor: default; pointer-events: none; }

  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    padding: 20px 48px;
    background: linear-gradient(to top, rgba(10,10,10,0.5) 0%, transparent 100%);

  footer span {

    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(240, 237, 232, 0.25);
    white-space: nowrap;

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }

  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .nav-links { gap: 20px; }

      position: relative;
      width: 100%;
      padding-top: 56.25%;
      top: 0; left: 0; right: auto; bottom: auto;
    }

      position: absolute;
      inset: 0;

      height: 100%;

<script src="https://player.vimeo.com/api/player.js"></script>
<script>
  const iframe = document.getElementById('vimeo-player');
  const player = new Vimeo.Player(iframe);
  const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  if (isMobile) {
    screen.orientation?.addEventListener('change', handleOrientation);
    window.addEventListener('orientationchange', handleOrientation);

    function handleOrientation() {
      setTimeout(() => {
        const isLandscape = window.innerWidth > window.innerHeight;
        if (isLandscape) {
          // Try Vimeo API first
          player.requestFullscreen().catch(() => {
            // Fallback: native fullscreen on the iframe element
            if (iframe.requestFullscreen) iframe.requestFullscreen();
            else if (iframe.webkitEnterFullscreen) iframe.webkitEnterFullscreen();
            else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
          });
        }
      }, 200);
    }
  }
</script>
