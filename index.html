<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #f0ede8;
    --black: #0a0a0a;
    --muted: rgba(240, 237, 232, 0.45);
    --tracking-name: 0.35em;
    --tracking-nav: 0.22em;
  }

  html { scroll-behavior: smooth; overflow-x: hidden; max-width: 100%; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: absolute;
    bottom: 36px;
    right: 52px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .nav-icons {
    display: flex;
    align-items: center;
    gap: 18px;
    padding-right: 8px;
    border-right: 1px solid rgba(232,228,222,0.15);
  }

  .nav-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.75;
    transition: opacity 0.25s;
    color: #f0ede8;
    text-decoration: none;
  }

  .nav-icon:hover { opacity: 1; }

  .nav-icon svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
  }

  .nav-links {
    display: flex;
    gap: 28px;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: var(--tracking-nav);
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    opacity: 0;
    animation: fadeIn 1.2s ease 2s forwards;
    transition: opacity 0.25s;
  }

  .nav-links a:hover { opacity: 0.5; }

    background-size: cover;
    background-position: 55% 45%;
    will-change: transform;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,10,10,0.22) 0%,
      rgba(10,10,10,0.05) 35%,
      rgba(10,10,10,0.55) 70%,
      rgba(10,10,10,0.75) 100%
    );
  }

  /* Title card — bottom left, aligned with nav */
  .hero-content {
    position: absolute;
    bottom: 36px;
    left: 52px;
    z-index: 2;
    text-align: left;
  }

  .hero-name {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: clamp(1.6rem, 3.2vw, 2.8rem);
    letter-spacing: var(--tracking-name);
    text-transform: uppercase;
    /* Godfree uses a warm off-white, slightly desaturated */
    color: #e8e4de;
    line-height: 1;
    opacity: 0;
    animation: riseIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  }

  .hero-title {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: clamp(0.65rem, 1.1vw, 0.85rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(232, 228, 222, 1);
    margin-top: 10px;
    opacity: 0;
    animation: riseIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
  }

  /* Scroll hint */

  /* ── CONTACT ── */
  .contact {
    background: var(--black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 52px;
    position: relative;
    z-index: 2;
    width: 100%;
  }

  .contact::before {
    content: '';
    position: absolute;
    top: 0; left: 8%; right: 8%;
    height: 1px;
    background: rgba(240, 237, 232, 0.08);
  }

  .contact-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 36px;
    animation: fadeIn 0.8s ease 0.2s both;
  }

  .card-name {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: clamp(1.3rem, 2.2vw, 1.8rem);
    letter-spacing: 0.30em;
    text-transform: uppercase;
    color: #e8e4de;
    line-height: 1;
  }

  .card-title {
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(240, 237, 232, 0.35);
    margin-top: -16px;
  }

  .card-portrait {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid rgba(240, 237, 232, 0.12);
  }

  .card-portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 60% 15%;
    filter: grayscale(100%) sepia(15%) brightness(0.85);
  }

  .card-details {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .card-value {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 18px;
    letter-spacing: 0.06em;
    color: var(--white);
    text-decoration: none;
    cursor: default;
    user-select: none;
    transition: opacity 0.2s;
  }

  /* The sensitive blurred portion */
  .card-value .blurred {
    display: inline-block;
    filter: blur(5px);
    transition: filter 0.4s ease;
  }

  /* Unblur on hover */
  .card-value:hover .blurred {
    filter: blur(0);
  }

  /* Second-click state */
  .card-value.revealed {
    cursor: pointer;
  }

  .card-value.revealed:hover {
    opacity: 0.6;
  }

  /* Prevent blue tap highlight and link colour on mobile */
  .card-value {
    -webkit-tap-highlight-color: transparent;
    color: var(--white);
  }

  .card-value.revealed .blurred {
    color: var(--white);
  }

  .card-socials {
    display: flex;
    gap: 24px;
    margin-top: -8px;
  }

  .card-social-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    text-decoration: none;
    transition: opacity 0.25s;
    opacity: 0.75;
  }
  .card-social-icon:hover { opacity: 1; }
  .card-social-icon svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }
  .card-social-icon[aria-label="Instagram"] { color: #e1306c; }
  .card-imdb-badge svg { width: 44px; height: 22px; } .card-imdb-badge { opacity: 0.85; }
  .card-iatse-badge svg { width: 40px; height: 40px; } .card-iatse-badge { opacity: 0.75; }

  .card-social-link:hover {
    color: var(--white);
    border-color: rgba(240, 237, 232, 0.4);
  }

    /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 2;
    padding: 36px 52px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(240, 237, 232, 0.06);
  }

  footer span {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(240, 237, 232, 0.18);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
    50% { opacity: 0.7; }
  }

  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    nav { bottom: 28px; right: 28px; padding: 0; }
    .hero-content { left: 28px; right: auto; bottom: 28px; text-align: left; }
    .contact { padding: 80px 28px; }
    .contact-heading { font-size: clamp(1.8rem, 7vw, 2.8rem); }
    .contact-item { flex-direction: column; gap: 4px; text-align: center; }
    .contact-label { text-align: center; width: auto; }
    footer { flex-direction: column; gap: 10px; text-align: center; }
    .card-portrait { width: 120px; height: 120px; }
    .card-value { font-size: 15px; }
    .contact-card { gap: 28px; }
  }


  

  


  /* ── MOBILE ── */
  @media (max-width: 480px) {
    /* Stop horizontal overflow */
    html, body { overflow-x: hidden; }
    * { max-width: 100%; }

    .hero-name { letter-spacing: 0.2em; }

    /* Contain bg inside hero so it doesn't bleed into contact section */
    .hero-bg {
      position: absolute;
      inset: 0;
    }

    /* Hide desktop nav and scroll hint on mobile */
    nav { display: none; }
    .scroll-hint { display: none; }

    /* Title card position */
    .hero-content { left: 28px; bottom: calc(60px + env(safe-area-inset-bottom)); }
  }

  .mobile-contact-nav { display: none; }

  @media (max-width: 480px) {
    /* Force contact section to stack vertically centered */
    .contact {
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 0 28px 80px;
    }

    .mobile-contact-nav {
      display: flex;
      justify-content: center;
      gap: 36px;
      padding: 12px 0 112px;
      width: 100%;
    }

    .mobile-contact-nav a {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #f0ede8;
      text-decoration: none;
      padding: 12px 0;
    }
  }
</style>
</head>

<script>
  // Parallax
  const heroBg = document.getElementById('heroBg');
  const heroContent = document.querySelector('.hero-content');
  const isMobile = () => window.innerWidth <= 768;
  let ticking = false;
  function updateParallax() {
    const scrollY = window.scrollY;
    if (!isMobile()) {
      heroBg.style.transform = `translateY(${scrollY * 0.15}px)`;
    } else {
      heroContent.style.transform = `translateY(-${scrollY * 0.3}px)`;
    }
    ticking = false;
  }
  updateParallax();
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(updateParallax);
      ticking = true;
    }
  }, { passive: true });

  // Scroll reveal
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 90);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05, rootMargin: "0px 0px -50px 0px" });
  reveals.forEach(el => observer.observe(el));

  // Blur-reveal contact: hover unblurs, click (once revealed) triggers action
  function setupReveal(id, action) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('click', function() {
      if (el.classList.contains('revealed')) {
        action();
      } else {
        el.classList.add('revealed');
        // Force unblur immediately on tap (for touch devices that skip hover)
        const blurred = el.querySelector('.blurred');
        if (blurred) blurred.style.filter = 'blur(0)';
      }
    });
    // Keyboard support
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') el.click();
    });
  }

  function setupReveal(id, href) {
    const el = document.getElementById(id);
    if (!el) return;

    // Hidden anchor used to fire mailto/tel without blue-link flash
    const a = document.createElement('a');
    a.href = href;
    a.style.display = 'none';
    document.body.appendChild(a);

    el.addEventListener('click', function() {
      if (el.classList.contains('revealed')) {
        a.click();
      } else {
        el.classList.add('revealed');
        const blurred = el.querySelector('.blurred');
        if (blurred) blurred.style.filter = 'blur(0)';
      }
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') el.click();
    });
  }

  setupReveal('emailLink', atob('bWFpbHRvOmNhbWVyYUBjaHJpcy1jaHVuZy5jb20='));
  setupReveal('phoneLink', atob('dGVsOisxNjQ3ODczOTA1MQ=='));
</script>
